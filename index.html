<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15F Strategy Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --limbus-red: #ef4444; --limbus-gold: #facc15; --bg-dark: #070707; }
        body { background-color: var(--bg-dark); color: #e5e7eb; font-family: 'Pretendard', sans-serif; overflow: hidden; font-size: 12px; }
        
        .sin-분노 { color: #ff4d4d; } .sin-색욕 { color: #ff944d; } .sin-나태 { color: #ffdb4d; }
        .sin-탐식 { color: #b7ff4d; } .sin-우울 { color: #4dffdb; } .sin-오만 { color: #4da6ff; } .sin-질투 { color: #a64dff; }
        .atk-type { color: #fef08a; font-weight: bold; }

        /* [사이드바 레이아웃] */
        .sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: #111; position: relative; height: 100vh; flex-shrink: 0; z-index: 1000; }
        .sidebar-inner { width: 260px; height: 100%; display: flex; flex-direction: column; transition: opacity 0.2s; }

        /* 접혔을 때 내부 잔상 완벽 제거 */
        @media (min-width: 769px) {
            .sidebar.collapsed { width: 0 !important; border: none; }
            .sidebar.collapsed .sidebar-inner { visibility: hidden; opacity: 0; pointer-events: none; }
            #left-sidebar { width: 260px; }
            #right-sidebar { width: 280px; }
            #right-sidebar .sidebar-inner { width: 280px; }
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; width: 280px !important; }
            #left-sidebar { left: -280px; transition: left 0.3s ease; }
            #right-sidebar { right: -280px; transition: right 0.3s ease; }
            #left-sidebar.active { left: 0 !important; }
            #right-sidebar.active { right: 0 !important; }
            .sidebar-inner { width: 280px; }
        }

        /* [사이드바 일체형 핸들] */
        .sidebar-handle { position: absolute; top: 10px; width: 30px; height: 45px; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; z-index: 1001; }
        #left-sidebar .sidebar-handle { right: -30px; border-left: none; border-radius: 0 5px 5px 0; }
        #right-sidebar .sidebar-handle { left: -30px; border-right: none; border-radius: 5px 0 0 5px; }

        /* [중앙 헤더 배치 가이드] */
        header { padding-left: 50px !important; padding-right: 50px !important; }
        .header-center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; flex: 1; }
        .header-left { display: flex; align-items: center; gap: 8px; width: 280px; }
        .reset-group { display: flex; align-items: center; gap: 1px; background: #1a1a1a; padding: 2px; border-radius: 6px; border: 1px solid #333; }
        .reset-group button { padding: 4px 10px; font-size: 10px; color: #888; transition: all 0.2s; }
        .reset-group button:hover { color: var(--limbus-red); background: #222; }

        /* 기프트 활성화 상태 */
        .active-slot { border-left: 4px solid var(--limbus-red); background: #2d1010; color: white; }
        .gift-active { background: #991b1b; color: white; border: 1px solid #ff0000; animation: pulse 2s infinite; }
        .gift-extra { background: #854d0e; color: #fef08a; border: 1px solid #eab308; box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); animation: pulse-extra 1.5s infinite; font-weight: bold; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes pulse-extra { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }

        input[type="number"] { width: 32px; background: #ffffff !important; color: #000000 !important; border: 1px solid #ff0000; text-align: center; border-radius: 2px; font-weight: 900 !important; font-size: 11px; padding: 1px 0; }

        /* 툴팁 */
        .has-tooltip { position: relative; }
        .tooltip { visibility: hidden; opacity: 0; position: absolute; z-index: 999; right: 105%; top: 0; width: 240px; background-color: rgba(0, 0, 0, 0.95); color: #eee; padding: 10px; border: 1px solid #444; border-radius: 6px; font-size: 11px; line-height: 1.4; white-space: normal; box-shadow: -5px 5px 15px rgba(0,0,0,0.5); pointer-events: none; transition: opacity 0.2s; }
        .has-tooltip:hover .tooltip { visibility: visible; opacity: 1; }
        .tooltip b { color: var(--limbus-red); display: block; margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px; }

        .kw-summary-item { border-right: 1px solid #333; padding-right: 8px; margin-right: 8px; font-size: 12px; font-weight: bold; }
        .kw-summary-item:last-child { border-right: none; }
        .dragging { opacity: 0.5; background: #333 !important; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 900; }
        .overlay.active { display: block; }
    </style>
</head>
<body class="flex h-screen w-screen border-t-2 border-red-900 overflow-hidden">

    <div id="sidebar-overlay" class="overlay" onclick="closeAllSidebars()"></div>

    <!-- [좌측 사이드바] -->
    <aside id="left-sidebar" class="sidebar border-r border-stone-800">
        <div class="sidebar-handle" onclick="toggleSidebar('left')">
            <i id="left-icon" class="fas fa-bars"></i>
        </div>
        <div class="sidebar-inner">
            <div class="p-4 font-bold text-stone-500 flex justify-between items-center border-b border-stone-900">
                <span class="tracking-widest uppercase text-[18px] font-black text-stone-200">편성 목록</span>
                <button onclick="addNewSlot()" class="text-red-500 hover:scale-110 transition"><i class="fas fa-plus-circle"></i></button>
            </div>
            <div id="slot-list" class="flex-1 overflow-y-auto p-2 space-y-1 scroll-dark"></div>
            <div class="p-2 text-[10px] text-stone-700 text-center bg-black/30">더블 클릭 : 이름 변경 / 드래그 : 위치 변경</div>
        </div>
    </aside>

    <!-- [중앙 메인 영역] -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="p-4 border-b border-stone-900 bg-stone-950/80 flex items-center justify-between">
            <!-- 좌측: 코드 입출력 -->
            <div class="header-left">
                <div class="flex flex-col gap-1 w-full">
                    <div class="flex gap-1">
                        <input id="in-code" type="text" class="bg-black text-[9px] p-1.5 flex-1 rounded border border-stone-800 outline-none" placeholder="IMPORT">
                        <button onclick="importCode(true)" class="bg-stone-800 px-2 py-1 rounded text-[9px]">추가</button>
                    </div>
                    <div class="flex gap-1">
                        <input id="out-code" readonly type="text" class="bg-black text-[9px] p-1.5 flex-1 rounded border border-stone-800 outline-none" placeholder="EXPORT">
                        <button onclick="copyExportCode()" class="bg-blue-900/50 text-blue-400 border border-blue-900/50 px-2 py-1 rounded text-[9px] hover:bg-blue-900">복사</button>
                    </div>
                </div>
            </div>

            <!-- 중앙: 정보 및 리셋 -->
            <div class="header-center">
                <div class="flex items-center gap-6">
                    <label class="relative inline-flex items-center cursor-pointer scale-110">
                        <input type="checkbox" id="deployment-toggle" onchange="updateDeployment(this.checked)" class="sr-only peer">
                        <div class="w-16 h-6 bg-stone-800 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-red-600 after:rounded-full after:h-5 after:w-7 after:transition-all"></div>
                        <div class="absolute w-full flex justify-around text-[8px] font-bold pointer-events-none px-2 text-stone-300"><span>6인</span><span>7인</span></div>
                    </label>
                    <h1 id="active-slot-name-display" class="text-2xl font-black text-red-600 uppercase tracking-tighter"></h1>
                </div>
                <div class="reset-group">
                    <button onclick="resetPart('party')">인격 리셋</button>
                    <button onclick="resetPart('gifts')">기프트 리셋</button>
                    <button onclick="resetPart('floors')">팩 리셋</button>
                    <button onclick="resetPart('all')" class="text-red-600 font-bold">전체 초기화</button>
                </div>
            </div>

            <!-- 우측: 통계 요약 -->
            <div class="flex flex-col items-end gap-1 w-[280px]">
                <div id="total-summary" class="flex flex-wrap gap-1 justify-end"></div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 scroll-dark">
            <section id="active-party" class="space-y-1"></section>
            
            <section class="border-t border-stone-900 pt-2">
                <div class="flex justify-between items-center cursor-pointer mb-2 bg-stone-900/30 p-1 px-2 rounded hover:bg-stone-800" onclick="toggleReserve()">
                    <h4 class="text-[10px] font-bold text-stone-500 uppercase tracking-widest">대기편성</h4>
                    <i id="reserve-icon" class="fas fa-chevron-up text-stone-600 text-[10px]"></i>
                </div>
                <div id="reserve-party" class="space-y-1 overflow-hidden" style="max-height: 1000px;"></div>
            </section>

            <section class="border-t border-stone-900 pt-4">
                <h4 class="text-[14px] font-bold text-blue-500 mb-2 uppercase">1~15층 팩</h4>
                <div id="floor-list" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2"></div>
            </section>

            <footer class="mt-12 border-t border-stone-800 pt-8 pb-16">
                <div class="flex items-center gap-2 mb-6">
                    <i class="fas fa-info-circle text-red-600"></i>
                    <h3 class="text-stone-500 font-bold uppercase tracking-widest text-[11px]">주의사항</h3>
                </div>
                <div id="guide-container" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6 text-[11px] text-stone-400 leading-relaxed"></div>
            </footer>
        </div>
    </main>

    <!-- [우측 사이드바] -->
    <aside id="right-sidebar" class="sidebar border-l border-stone-800">
        <div class="sidebar-handle" onclick="toggleSidebar('right')">
            <i id="right-icon" class="fas fa-box-open"></i>
        </div>
        <div class="sidebar-inner">
            <div class="p-3 border-b border-stone-900 font-bold text-red-600 flex justify-between items-center">
                <span class="text-lg">에고 기프트</span>
                <button onclick="toggleSort()" class="text-[12px] text-stone-500 hover:text-white">등급 <i class="fas fa-sort"></i></button>
            </div>
            <div class="p-2 border-b border-stone-800">
                <input type="text" id="gift-search" oninput="renderGifts()" class="w-full bg-black text-xs p-2 rounded border border-stone-800 outline-none" placeholder="Search...">
            </div>
            <div id="gift-inventory" class="flex-1 overflow-y-auto p-2 space-y-1 scroll-dark"></div>
        </div>
    </aside>

    <script src="js/app.js"></script>
</body>
</html>
